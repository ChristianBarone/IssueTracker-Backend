<style>
    table { width: 100%; border-collapse: collapse; font-family: sans-serif; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
    .status-new { background: #8e44ad; color: white; padding: 4px 8px; border-radius: 3px; font-size: 0.8em; }
    .btn-new { background: #699b00; color: white; padding: 10px; text-decoration: none; border-radius: 4px; float: right; }
</style>

<a href="{% url 'issue_create' %}" class="btn-new">+ NEW ISSUE</a>
<h1>Issues</h1>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>SUBJECT</th>
            <th>STATUS</th>
            <th>TYPE</th>
            <th>PRIORITY</th>
            <th>MODIFIED</th>
        </tr>
    </thead>
    <tbody>
        {% for issue in issues %}
        <tr>
            <td><a href="{% url 'issue_detail' issue.id %}">#{{ issue.id }}</a></td>
            <td><strong><a href="{% url 'issue_detail' issue.id %}">{{ issue.subject }}</a></strong></td>
            <td><span class="status-new">{{ issue.status }}</span></td>
            <td>{{ issue.issue_type }}</td>
            <td>{{ issue.priority }}</td>
            <td>{{ issue.modified_at|date:"d M Y" }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
