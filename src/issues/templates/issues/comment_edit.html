<style>
    body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 0 20px; }
    h2 { color: #333; border-bottom: 2px solid #5dc5b5; padding-bottom: 10px; }
    textarea {
        width: 100%; min-height: 150px; padding: 12px; border: 1px solid #cbd5e1;
        border-radius: 6px; margin: 20px 0; font-family: inherit; box-sizing: border-box;
    }
    .btn-save { background: #5dc5b5; color: white; border: none; padding: 10px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; }
    .btn-cancel { color: #64748b; text-decoration: none; margin-left: 15px; font-size: 0.9em; }
</style>

<h2>Edit Comment</h2>

<form method="POST">
    {% csrf_token %}
    <textarea name="body" required>{{ comment.body }}</textarea>

    <div style="text-align: right; align-items: center; display: flex; justify-content: flex-end;">
        <a href="{% url 'issue_detail' comment.issue.id %}" class="btn-cancel">Cancel</a>
        <button type="submit" class="btn-save">SAVE CHANGES</button>
    </div>
</form>
