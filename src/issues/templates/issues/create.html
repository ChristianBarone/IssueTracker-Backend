<h1>Nuevo Issue</h1>
<form method="POST">
    {% csrf_token %}
    <label>Asunto (Subject):</label><br>
    <input type="text" name="subject" required><br><br>
    
    <label>Descripción:</label><br>
    <textarea name="description" rows="5"></textarea><br><br>
    
    <button type="submit">Guardar Issue</button>
</form>
